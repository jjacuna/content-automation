<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Content Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/custom.css') }}" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="antialiased">
    <div class="login-wrapper">
        <div class="login-card" x-data="{ showPass: false }">
            <!-- Branding -->
            <div class="login-brand">
                <div class="login-brand-icon">
                    <i data-lucide="zap" class="w-7 h-7"></i>
                </div>
                <div class="login-brand-title">Content Engine</div>
                <div class="login-brand-sub">Automation Demo &mdash; Claude Workshop</div>
            </div>

            <!-- Error Message -->
            {% if error %}
            <div class="login-error">
                <i data-lucide="alert-circle" class="w-4 h-4 flex-shrink-0"></i>
                {{ error }}
            </div>
            {% endif %}

            <!-- Login Form -->
            <form method="POST" action="/login">
                <div class="mb-4">
                    <label class="input-label" for="username">Username</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        class="input"
                        placeholder="Enter username"
                        autocomplete="username"
                        autofocus
                        required>
                </div>

                <div class="mb-6">
                    <label class="input-label" for="password">Password</label>
                    <div class="input-group">
                        <input
                            :type="showPass ? 'text' : 'password'"
                            id="password"
                            name="password"
                            class="input"
                            style="padding-right: 42px;"
                            placeholder="Enter password"
                            autocomplete="current-password"
                            required>
                        <button type="button"
                                class="input-toggle"
                                @click="showPass = !showPass">
                            <i x-show="!showPass" data-lucide="eye" class="w-4 h-4"></i>
                            <i x-show="showPass" data-lucide="eye-off" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg btn-full">
                    Sign In
                </button>
            </form>

            <!-- Hint -->
            <p class="text-center mt-6" style="font-size: 12px; color: var(--text-subtle);">
                Default: admin / admin
            </p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof lucide !== 'undefined') lucide.createIcons();
        });
    </script>
</body>
</html>
